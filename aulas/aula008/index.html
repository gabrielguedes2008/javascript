<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: rgb(162, 162, 248);
            font-family: Arial, Helvetica, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 98vh;
        }
        
        div {
            height: 500px;
            width: 600px;
            
        }

        
    </style>
</head>
<body>
    <div>
        <h1>Calculadora</h1>
        <input type="number" name="numero1" id="num1" placeholder="Digite um numero">
        <input type="number" name="numero2" id="num2" placeholder="Digite um numero">
        <br>
        <input type="button" value="SOMAR" onclick="somar()">
        <input type="button" value="SUBTRAIR" onclick="sub()">
        <br>
        <input type="button" value="MULTIPLICAÇÃO" onclick="mult()">
        <input type="button" value="DIVISÃO" onclick="divs()">
        <p id="result">Resultado....</p>
    </div>


    <script>
        function somar() {
            var n1 = document.getElementById('num1')
            var n2 = document.getElementById('num2')
            var result = document.getElementById('result')
            n1 = Number(n1.value)
            n2 = Number(n2.value)
            var soma = n1 + n2
            result.innerText = soma
        }

        function sub() {
            var n1 = document.getElementById('num1')
            var n2 = document.getElementById('num2')
            var result = document.getElementById('result')
            n1 = Number(n1.value)
            n2 = Number(n2.value)
            var soma = n1 - n2
            result.innerText = soma
        }

        function mult() {
            var n1 = document.getElementById('num1')
            var n2 = document.getElementById('num2')
            var result = document.getElementById('result')
            n1 = Number(n1.value)
            n2 = Number(n2.value)
            var soma = n1 * n2
            result.innerText = soma
        }

        function divs() {
            var n1 = document.getElementById('num1')
            var n2 = document.getElementById('num2')
            var result = document.getElementById('result')
            n1 = Number(n1.value)
            n2 = Number(n2.value)
            var soma = n1 / n2
            result.innerText = soma
        }
    </script>
</body>
</html>
