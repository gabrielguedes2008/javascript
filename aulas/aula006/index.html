<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            background-color: rgb(255, 104, 104);
            color: white;
            height: 300px;
            width: 300px;
            line-height: 300px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div onclick="clicar()" onmouseenter="entrar()" onmouseleave="sair()">
        <h1>Clique em mim</h1>
    </div>


    <script>
        var botao = document.getElementsByTagName('div')[0]

        botao.addEventListener('click', clicar)
        botao.addEventListener('mouseenter', entrar)
        botao.addEventListener('mouseleave', sair)

        function clicar(){
            botao.innerText = 'Clicou'
            botao.style.backgroundColor = 'blue'
        }

        function entrar(){
            botao.innerText = 'Entrou'
        }

        function sair(){
            botao.innerText = 'Saiu'
            botao.style.backgroundColor = 'rgb(255, 104, 104)'
        }
    </script>
</body>
</html>
